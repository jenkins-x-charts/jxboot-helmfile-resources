{{- if and (eq "bucketrepo" .Values.jxRequirements.repository) (not .Values.istio.enabled) (eq "httproute" (include "ingressKind" (dict "Values" .Values "component" "bucketrepo"))) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
{{- $annotations := include "httpRouteAnnotations" (dict "Values" .Values "component" "bucketrepo") }}
{{- if $annotations }}
  annotations:
  {{- $annotations | nindent 4 }}
{{- end }}
  name: bucketrepo
spec:
{{- $parentRefs := include "httpRouteParentRefs" (dict "Values" .Values "component" "bucketrepo") }}
{{- if trim $parentRefs }}
  parentRefs:
  {{- $parentRefs | nindent 2 }}
{{- end }}
{{- if or .Values.bucketrepo.httpRoute.customHost .Values.jxRequirements.ingress.domain }}
  hostnames:
  - {{ include "httpRouteHostname" (dict "Values" .Values "component" "bucketrepo") }}
{{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: bucketrepo
      port: 80
{{- end }}
